<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Ảnh Đẹp - Phóng To Lightbox</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
    <div class="navbar">
        <a href="../index.html" class="logo">🇻🇳 Du Lịch Việt Nam</a>
        <div class="nav-container">
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html" >Trang chủ</a></li>
                <li><a href="gioithieu.html" >Giới thiệu</a></li>
                <li><a href="diadiem.html" class="active">Địa điểm</a></li>
                <li><a href="gallery.html" >Thư viện ảnh</a></li>
                <li><a href="lienhe.html" >Liên hệ</a></li>
            </ul>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
</header>

    <div class="container">
        <h1>Thư Viện Ảnh Du Lịch Việt Nam</h1>
        <p style="margin-bottom: 25px; color: gray;">Nhấn vào bất kỳ ảnh nào để bật tính năng Lightbox phóng to ảnh nền tối chuyên nghiệp.</p>
        
        <div class="gallery-grid">
            <div class="gallery-item"><img src="../images/vinhhalong.jpg" alt="Vịnh Hạ Long" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/ruong.webp" alt="Sa Pa" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/trangan.webp" alt="Tràng An" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/hoiantown.jpg" alt="Hội An" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/banahills.jpg" alt="Bà Nà Hills" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/dainoihue.webp" alt="Đại Nội Huế" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/chobenthanh.jpg" alt="Chợ Bến Thành" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/phuquoc.jpeg" alt="Đảo Phú Quốc" onclick="openLightbox(this)"></div>
            <div class="gallery-item"><img src="../images/muine.jpg" alt="Mũi Né" onclick="openLightbox(this)"></div>
        </div>
    </div>

    <!-- CẤU TRÚC LIGHTBOX PHÓNG TO ẢNH -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn" style="color: white; top: 20px; right: 30px;">&times;</span>
        <img id="lightboxImg" class="lightbox-img" src="" alt="Ảnh Phóng To">
    </div>

    <footer><p>© 2026 Website Giới Thiệu Du Lịch Việt Nam</p></footer>
    <script src="../js/script.js"></script>
</body>
</html>
