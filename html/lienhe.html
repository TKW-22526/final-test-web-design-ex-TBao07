<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ & Góp Ý</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
    <div class="navbar">
        <a href="../index.html" class="logo">🇻🇳 Du Lịch Việt Nam</a>
        <div class="nav-container">
           <ul class="nav-links" id="navLinks">
                <li><a href="../index.html" >Trang chủ</a></li>
                <li><a href="gioithieu.html" >Giới thiệu</a></li>
                <li><a href="diadiem.html" class="active">Địa điểm</a></li>
                <li><a href="gallery.html" >Thư viện ảnh</a></li>
                <li><a href="lienhe.html" >Liên hệ</a></li>
            </ul>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
</header>

    <div class="container">
        <h1>Liên Hệ & Góp Ý Ý Kiến</h1>
        <form class="contact-form" onsubmit="handleContactSubmit(event)">
            <div class="form-group">
                <label for="fullname">Họ tên của bạn:</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên..." required>
            </div>
            <div class="form-group">
                <label for="email">Địa chỉ Email:</label>
                <input type="email" id="email" placeholder="Nhập địa chỉ email liên hệ..." required>
            </div>
            <div class="form-group">
                <label for="content">Nội dung góp ý:</label>
                <textarea id="content" rows="6" placeholder="Viết nội dung chia sẻ hoặc góp ý tại đây..." required></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 12px; font-size:16px;">Gửi thông tin góp ý</button>
        </form>
    </div>

    <footer><p>© 2026 Website Giới Thiệu Du Lịch Việt Nam</p></footer>
    <script src="../js/script.js"></script>
</body>
</html>
